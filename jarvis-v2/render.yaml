# ════════════════════════════════════════════════════════════════════
#  JARVIS v2 — Render.com deployment manifest
#
#  Deploy options by model size:
#  ─────────────────────────────────────────────────────────────────
#  TinyLlama (1.1B, CPU)   →  Standard plan (2 GB RAM)
#  Phi-2     (2.7B, CPU)   →  Standard plan (4 GB RAM)
#  Mistral-7B (4-bit GPU)  →  GPU plan (A10G or better)
#  LLaMA-3 8B (4-bit GPU)  →  GPU plan (A10G or better)
# ════════════════════════════════════════════════════════════════════

services:
  - type: web
    name: jarvis-v2
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .

    # Scale up for larger models
    plan: standard              # 2 GB RAM — sufficient for TinyLlama/Phi-2 on CPU

    healthCheckPath: /health    # lightweight liveness probe, no model call
    autoDeploy: true

    # Model weights persist across deploys — avoids multi-GB re-downloads
    disk:
      name: hf-model-cache
      mountPath: /app/.cache/huggingface
      sizeGB: 20

    envVars:
      # ── Model selection ────────────────────────────────────────────
      - key: LLM_MODEL_ID
        value: tinyllama         # change to mistral-7b, phi-3-mini, etc.

      - key: HF_TOKEN
        sync: false              # set secret in Render dashboard

      - key: LLM_DEVICE
        value: cpu               # set to "cuda" on GPU plans

      - key: LLM_LOAD_IN_4BIT
        value: "false"           # set to "true" on GPU plans only

      - key: LLM_MAX_NEW_TOKENS
        value: "1024"

      - key: LLM_TEMPERATURE
        value: "0.7"

      # ── Tools ─────────────────────────────────────────────────────
      - key: ALLOWED_TOOLS
        value: web_search,run_python_code,file_reader,system_status

      - key: TOOL_TIMEOUT_SECONDS
        value: "30"

      # ── Memory ────────────────────────────────────────────────────
      - key: SESSION_TTL_SECONDS
        value: "3600"

      - key: MAX_HISTORY_MESSAGES
        value: "40"

      # ── App ───────────────────────────────────────────────────────
      - key: APP_NAME
        value: JARVIS

      - key: DEBUG
        value: "false"

      - key: ALLOWED_ORIGINS
        value: '["https://your-frontend.com"]'   # replace with real domain
