version: "3.9"

# ════════════════════════════════════════════════════════════════════
#  JARVIS 2.0 — Local Development Stack
#  Usage: docker compose up --build
# ════════════════════════════════════════════════════════════════════

services:

  backend:
    build:
      context: .
      target: app
    container_name: jarvis-backend
    ports:
      - "8000:10000"
    volumes:
      - jarvis-data:/app/data
      - ./app:/app/app:ro          # hot-reload source in dev
    environment:
      LLM_MODEL_ID:       tinyllama
      LLM_DEVICE:         cpu
      LLM_MAX_NEW_TOKENS: "256"
      DB_PATH:            /app/data/jarvis.db
      ALLOWED_ORIGINS:    "http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500"
      LOG_LEVEL:          DEBUG
      DEBUG:              "true"
    restart: unless-stopped
    healthcheck:
      test:     ["CMD", "curl", "-sf", "http://localhost:10000/health"]
      interval: 30s
      timeout:  10s
      start_period: 120s
      retries:  3

volumes:
  jarvis-data:
    driver: local
